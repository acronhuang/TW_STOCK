name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Syntax check (all .py)
        run: |
          python -c "
          import ast, os
          errors = []
          for root, _, files in os.walk('src'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try: ast.parse(open(path).read())
                      except SyntaxError as e: errors.append(f'{path}:{e.lineno}')
          if errors:
              print('Syntax errors:'); [print(f'  {e}') for e in errors]; exit(1)
          print(f'All {sum(1 for r,_,fs in os.walk(\"src\") for f in fs if f.endswith(\".py\"))} files OK')
          "

      - name: Run unit tests
        env:
          MONGODB_URI: mongodb://localhost:27017/tw_stock_analysis
        run: |
          pytest tests/ -v --tb=short -m "not slow" -k "not api"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check src/ --select E9,F63,F7,F82 --no-fix
